<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nest This Card</title>
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css" />
    <link rel="stylesheet" href="./styles.css?v=20260322" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./config.js?v=20260322"></script>
    <script src="./app.js?v=20260322" defer></script>
  </head>
  <body class="popup" data-page="attach-child">
    <div class="page">
      <div class="card stack compact-popup">
        <h1>Nest This Card</h1>

        <div class="notice" id="auth-status">Authorize Trello to continue.</div>
        <div class="row wrap" id="auth-row">
          <button class="secondary" id="authorize-btn" type="button">Authorize Trello API</button>
        </div>

        <form id="attach-child-form" class="stack">
          <div class="field">
            <label for="parentPickerInput">Parent</label>
            <div class="combobox">
              <input
                id="parentPickerInput"
                name="parentPickerInput"
                autocomplete="off"
                placeholder="Search parent card"
              />
              <input id="parentCardId" name="parentCardId" type="hidden" />
              <div id="parentPickerMenu" class="combobox-menu" hidden></div>
            </div>
          </div>

          <div class="row wrap">
            <button class="ghost" id="refresh-parents-btn" type="button">Refresh</button>
          </div>

          <div class="row wrap">
            <button class="primary" type="submit">Nest Card</button>
            <button class="ghost" type="button" onclick="window.TrelloPowerUp.iframe().closePopup()">Cancel</button>
          </div>
        </form>

        <div id="message"></div>
      </div>
    </div>
  </body>
</html>
