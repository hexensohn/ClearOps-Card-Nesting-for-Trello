services:
  clearops-card-nesting:
    container_name: clearops-card-nesting
    build:
      context: .
    restart: unless-stopped
    expose:
      - "80"
    environment:
      POWERUP_APP_NAME: "${POWERUP_APP_NAME:-ClearOps Card Nesting}"
      POWERUP_API_KEY: "${POWERUP_API_KEY}"
      POWERUP_APP_URL: "${POWERUP_APP_URL}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: clearops-card-nesting-caddy
    restart: unless-stopped
    depends_on:
      - clearops-card-nesting
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    environment:
      SITE_HOST: "${SITE_HOST}"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
