services:
  clearops-card-nesting:
    container_name: clearops-card-nesting
    build:
      context: .
    restart: unless-stopped
    expose:
      - "80"
    environment:
      POWERUP_APP_NAME: "${POWERUP_APP_NAME:-ClearOps Card Nesting}"
      POWERUP_API_KEY: "${POWERUP_API_KEY}"
      POWERUP_APP_URL: "${POWERUP_APP_URL}"
      SQLITE_PATH: "${SQLITE_PATH:-/data/card_nesting.db}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - card_nesting_data:/data

  caddy:
    image: caddy:2-alpine
    container_name: clearops-card-nesting-caddy
    restart: unless-stopped
    depends_on:
      - clearops-card-nesting
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    environment:
      SITE_HOST: "${SITE_HOST}"
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  card_nesting_data:
